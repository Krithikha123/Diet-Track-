<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - DietTrack</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Dashboard Navigation -->
    <!-- Dashboard Header -->
    <header class="dashboard-header">
        <div class="logo">
            <i class="fas fa-apple-alt"></i>
            <span>DietTrack</span>
        </div>
        <div class="header-user-info">
            <i class="fas fa-user-circle"></i>
            <span id="header-username">User</span>
        </div>
    </header>

    <!-- Sidebar Toggle Button -->
    <button class="sidebar-toggle">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h3>Menu</h3>
        </div>
        <div class="sidebar-links">
            <a href="dashboard.html" id="nav-dashboard">
                <i class="fas fa-tachometer-alt"></i>
                Dashboard
            </a>
            <a href="profile.html" id="nav-profile" class="active">
                <i class="fas fa-user"></i>
                Profile
            </a>
            <a href="diet-plan.html" id="nav-diet-plan">
                <i class="fas fa-utensils"></i>
                Create Diet Plan
            </a>
            <a href="workout.html" id="nav-workout">
                <i class="fas fa-dumbbell"></i>
                Create Workout Plan
            </a>
            <a href="analytics.html" id="nav-analytics">
                <i class="fas fa-chart-line"></i>
                Analytics
            </a>
            <a href="ai.html" id="nav-ai">
                <i class="fas fa-robot"></i>
                AI Insights
            </a>
            <a href="feedback.html" id="nav-feedback">
                <i class="fas fa-comment"></i>
                Feedback
            </a>
            <a href="#" class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                Logout
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="profile-header">
            <h1><i class="fas fa-user-circle"></i> Your Profile</h1>
            <p>Setup your preferences here</p>
        </div>

        <div class="profile-form-container">
            <form id="profileForm">
                <div class="form-section">
                    <h2>Personal Information</h2>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="height">
                                <i class="fas fa-ruler-vertical"></i> Height (cm)
                            </label>
                            <input type="number" id="height" name="height" min="100" max="250" placeholder="e.g., 170"
                                required>
                        </div>

                        <div class="form-group">
                            <label for="weight">
                                <i class="fas fa-weight"></i> Weight (kg)
                            </label>
                            <input type="number" id="weight" name="weight" min="30" max="300" placeholder="e.g., 65"
                                required>
                        </div>

                        <div class="form-group">
                            <label for="age">
                                <i class="fas fa-birthday-cake"></i> Age
                            </label>
                            <input type="number" id="age" name="age" min="13" max="100" placeholder="e.g., 25" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Gender</label>
                            <div class="radio-group">
                                <label>
                                    <input type="radio" name="gender" value="male" required>
                                    <span>Male</span>
                                </label>
                                <label>
                                    <input type="radio" name="gender" value="female">
                                    <span>Female</span>
                                </label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Activity Level</label>
                            <div class="radio-group">
                                <label>
                                    <input type="radio" name="activityLevel" value="sedentary" required>
                                    <span>Sedentary</span>
                                </label>
                                <label>
                                    <input type="radio" name="activityLevel" value="light">
                                    <span>Light</span>
                                </label>
                                <label>
                                    <input type="radio" name="activityLevel" value="moderate">
                                    <span>Moderate</span>
                                </label>
                                <label>
                                    <input type="radio" name="activityLevel" value="active">
                                    <span>Active</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form-section">
                    <h2>Goals & Preferences</h2>

                    <div class="form-group">
                        <label>Your Goal</label>
                        <div class="radio-group">
                            <label>
                                <input type="radio" name="goal" value="weight lose" required>
                                <span>Weight Loss</span>
                            </label>
                            <label>
                                <input type="radio" name="goal" value="weight gain">
                                <span>Weight Gain</span>
                            </label>
                            <label>
                                <input type="radio" name="goal" value="maintain">
                                <span>Maintain Weight</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Daily Meals (Select all that apply)</label>
                        <div class="checkbox-grid">
                            <label class="checkbox-item">
                                <input type="checkbox" name="dailyMeals" value="breakfast">
                                <i class="fas fa-egg"></i>
                                <span>Breakfast</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="dailyMeals" value="lunch">
                                <i class="fas fa-utensils"></i>
                                <span>Lunch</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="dailyMeals" value="dinner">
                                <i class="fas fa-drumstick-bite"></i>
                                <span>Dinner</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="dailyMeals" value="snacks">
                                <i class="fas fa-apple-alt"></i>
                                <span>Snacks</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Select Diet Type</h2>
                    <p class="section-subtitle">Select multiple options based on your preferences</p>

                    <div class="diet-types-grid">
                        <label class="diet-type-card">
                            <input type="checkbox" name="dietTypes" value="veg">
                            <div class="diet-icon">
                                <i class="fas fa-leaf"></i>
                            </div>
                            <h3>Vegetarian</h3>
                            <p>Plant-based diet without meat</p>
                        </label>

                        <label class="diet-type-card">
                            <input type="checkbox" name="dietTypes" value="non-veg">
                            <div class="diet-icon">
                                <i class="fas fa-drumstick-bite"></i>
                            </div>
                            <h3>Non-Vegetarian</h3>
                            <p>Includes meat and animal products</p>
                        </label>

                        <label class="diet-type-card">
                            <input type="checkbox" name="dietTypes" value="low-carb">
                            <div class="diet-icon">
                                <i class="fas fa-bread-slice"></i>
                            </div>
                            <h3>Low Carb</h3>
                            <p>Reduced carbohydrate intake</p>
                        </label>

                        <label class="diet-type-card">
                            <input type="checkbox" name="dietTypes" value="high-protein">
                            <div class="diet-icon">
                                <i class="fas fa-dumbbell"></i>
                            </div>
                            <h3>High Protein</h3>
                            <p>High protein for muscle building</p>
                        </label>

                        <label class="diet-type-card">
                            <input type="checkbox" name="dietTypes" value="vegan">
                            <div class="diet-icon">
                                <i class="fas fa-seedling"></i>
                            </div>
                            <h3>Vegan</h3>
                            <p>No animal products at all</p>
                        </label>

                        <label class="diet-type-card">
                            <input type="checkbox" name="dietTypes" value="paleo">
                            <div class="diet-icon">
                                <i class="fas fa-fish"></i>
                            </div>
                            <h3>Paleo</h3>
                            <p>Ancient, whole foods diet</p>
                        </label>

                        <label class="diet-type-card">
                            <input type="checkbox" name="dietTypes" value="gluten-free">
                            <div class="diet-icon">
                                <i class="fas fa-wheat"></i>
                            </div>
                            <h3>Gluten Free</h3>
                            <p>No gluten-containing foods</p>
                        </label>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-save">
                        <i class="fas fa-save"></i> Save Profile
                    </button>
                    <button type="button" class="btn-cancel" onclick="window.location.href='dashboard.html'">
                        <i class="fas fa-times"></i> Cancel
                    </button>
                </div>
            </form>
        </div>
    </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/sidebar.js"></script>
</body>

</html>
