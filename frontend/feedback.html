<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - DietTrack</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .feedback-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .rating-section {
            margin: 20px 0;
        }

        .stars {
            font-size: 2rem;
            color: #ddd;
            cursor: pointer;
            display: inline-block;
        }

        .stars .fas {
            color: #FFD700;
        }

        .stars i {
            margin-right: 5px;
            transition: color 0.2s;
        }

        .stars i:hover {
            color: #FFC107;
        }

        .category-section {
            margin: 20px 0;
        }

        .category-section select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .message-section {
            margin: 20px 0;
        }

        .message-section textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            min-height: 150px;
            resize: vertical;
        }

        .submit-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }

        .submit-btn:hover {
            background-color: #45a049;
        }

        .feedback-rating {
            color: #FFD700;
            margin-bottom: 5px;
        }

        .feedback-category {
            display: inline-block;
            padding: 3px 8px;
            background: #e0e0e0;
            border-radius: 3px;
            font-size: 0.85rem;
        }

        .feedback-date {
            color: #666;
            font-size: 0.85rem;
        }

        .admin-response {
            margin-top: 10px;
            padding: 10px;
            background: #e3f2fd;
            border-radius: 5px;
            border-left: 3px solid #2196F3;
        }
    </style>
</head>

<body>
    <div class="dashboard">
        <!-- Dashboard Header -->
        <header class="dashboard-header">
            <div class="logo">
                <i class="fas fa-apple-alt"></i>
                <span>DietTrack</span>
            </div>
            <div class="header-user-info">
                <i class="fas fa-user-circle"></i>
                <span id="header-username">User</span>
            </div>
        </header>

        <!-- Sidebar Toggle Button -->
        <button class="sidebar-toggle">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>Menu</h3>
            </div>
            <div class="sidebar-links">
                <a href="dashboard.html" id="nav-dashboard">
                    <i class="fas fa-tachometer-alt"></i>
                    Dashboard
                </a>
                <a href="profile.html" id="nav-profile">
                    <i class="fas fa-user"></i>
                    Profile
                </a>
                <a href="diet-plan.html" id="nav-diet-plan">
                    <i class="fas fa-utensils"></i>
                    Create Diet Plan
                </a>
                <a href="workout.html" id="nav-workout">
                    <i class="fas fa-dumbbell"></i>
                    Create Workout Plan
                </a>
                <a href="analytics.html" id="nav-analytics">
                    <i class="fas fa-chart-line"></i>
                    Analytics
                </a>
                <a href="ai.html" id="nav-ai">
                    <i class="fas fa-robot"></i>
                    AI Insights
                </a>
                <a href="feedback.html" id="nav-feedback" class="active">
                    <i class="fas fa-comment"></i>
                    Feedback
                </a>
                <a href="#" class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <h1><i class="fas fa-comment"></i> Feedback & Suggestions</h1>
            <p>Help us improve DietTrack by sharing your thoughts and experiences.</p>

            <div class="feedback-container">
                <h2>Submit Your Feedback</h2>

                <div class="rating-section">
                    <label>Rating</label>
                    <div class="stars" id="starRating">
                        <i class="far fa-star" data-rating="1"></i>
                        <i class="far fa-star" data-rating="2"></i>
                        <i class="far fa-star" data-rating="3"></i>
                        <i class="far fa-star" data-rating="4"></i>
                        <i class="far fa-star" data-rating="5"></i>
                    </div>
                    <input type="hidden" id="ratingValue" value="0">
                </div>

                <div class="category-section">
                    <label>Category</label>
                    <select id="feedbackCategory">
                        <option value="general">General Feedback</option>
                        <option value="bug">Bug Report</option>
                        <option value="feature">Feature Request</option>
                        <option value="usability">Usability Issue</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="message-section">
                    <label>Your Message</label>
                    <textarea id="feedbackMessage"
                        placeholder="Please share your feedback, suggestions, or report any issues..."></textarea>
                </div>

                <button class="submit-btn" onclick="submitFeedback()">
                    <i class="fas fa-paper-plane"></i> Submit Feedback
                </button>
            </div>

            <script src="js/auth.js"></script>
            <script src="js/feedback.js"></script>
            <script src="js/sidebar.js"></script>
</body>

</html>
